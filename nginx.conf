
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    server {
        listen       80;
        server_name  192.168.0.175;

        #charset koi8-r;

        #access_log  logs/host.access.log  main;

        location / {
            root   html;
            index  index.html index.htm;
        }
		
	location /vehicle/ {
		proxy_pass	http://192.168.0.175:7899/vehicle/;
	}

        location /ws {  # WebSocket 路径
		proxy_pass http://192.168.0.175:9000;  # 你的 WebSocket 服务器地址
		proxy_http_version 1.1;  # 确保使用 HTTP/1.1
		proxy_set_header Upgrade $http_upgrade;  # 必须的配置
		proxy_set_header Connection "Upgrade";  # 必须的配置
		proxy_set_header Host $host;  # 保留主机头部
		proxy_set_header X-Real-IP $remote_addr;  # 客户端真实 IP
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 转发 IP
		proxy_set_header X-Forwarded-Proto $scheme;  # 转发协议
	    }
	
        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
